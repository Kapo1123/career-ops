name: Job Scan

on:
  schedule:
    - cron: '0 15 * * *'   # 8am MST (UTC-7)
    - cron: '0 17 * * *'   # 10am MST
    - cron: '0 19 * * *'   # 12pm MST
    - cron: '0 23 * * *'   # 4pm MST
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Run job scan
        run: node scan.mjs

      - name: Commit new pipeline entries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pipeline.md data/scan-history.tsv
          git diff --cached --quiet || git commit -m "chore(scan): auto-scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
