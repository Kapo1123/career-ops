name: Release Please
on:
  workflow_dispatch: # disabled for personal forks — trigger manually if needed

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          package-name: career-ops
          manifest-file: .release-please-manifest.json
