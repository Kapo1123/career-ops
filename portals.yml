# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # [CUSTOMIZED for Kapo Kwok — new grad SWE roles]
    # -- New grad / entry level signals --
    - "New Grad"
    - "New Graduate"
    - "Entry Level"
    - "Entry-Level"
    - "Early Career"
    - "University Grad"
    - "University Graduate"
    - "Associate Engineer"
    - "Associate Software Engineer"
    - "SWE I"
    - "Software Engineer I"
    - "0-2 years"
    # -- General SWE (broad catch-all) --
    - "Software Engineer"
    - "Software Developer"
    - "Backend Engineer"
    - "Backend Developer"
    - "Full Stack Engineer"
    - "Full-Stack Engineer"
    - "Full Stack Developer"
    - "Platform Engineer"
    - "Infrastructure Engineer"
    # -- Specific tech stack matches --
    - "Python Engineer"
    - "Java Engineer"
    - "Distributed Systems"
    - "Data Engineer"
    - "Cloud Engineer"
  negative:
    # [CUSTOMIZED] Exclude senior and unrelated roles
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Manager"
    - "Director"
    - "Architect"
    - "VP "
    - "Head of"
    - "5+ years"
    - "7+ years"
    - "10+ years"
    - "Intern"
    - "Operations Associate"
    - "Compliance"
    - "Legal"
    - "Finance"
    - "Accounting"
    - "Marketing"
    - "Sales"
    - "Recruiter"
    - "HR "
    - "Customer Success"
    - "Account Manager"
    - "Account Executive"
    - ".NET"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "iOS"
  seniority_boost:
    # These are NOT required — used to boost relevance score only
    - "Junior"
    - "Associate"
    - "New Grad"
    - "Entry Level"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # [CUSTOMIZED for Kapo Kwok — new grad SWE]
  # These are used by /career-ops scan (WebSearch) for portals with no API.
  # LinkedIn is rate-limited — queries go through Google's index (site:linkedin.com).

  # -- LinkedIn (via Google index) --
  - name: LinkedIn — New Grad SWE
    query: 'site:linkedin.com/jobs "Software Engineer" ("New Grad" OR "Entry Level" OR "University" OR "SWE I") -Senior -Staff'
    enabled: true

  - name: LinkedIn — Backend Engineer New Grad
    query: 'site:linkedin.com/jobs "Backend Engineer" OR "Backend Software Engineer" ("New Grad" OR "Entry Level" OR "Junior" OR "Associate") -Senior'
    enabled: true

  - name: LinkedIn — New Grad Python Java
    query: 'site:linkedin.com/jobs "Software Engineer" ("Python" OR "Java" OR "Kotlin") ("New Grad" OR "Entry Level" OR "University Graduate") United States'
    enabled: true

  # -- Google Careers (custom portal, no public API) --
  - name: Google — New Grad SWE
    query: 'site:careers.google.com "Software Engineer" ("New Grad" OR "University Grad" OR "Early Career" OR "II") -Senior -Staff -Principal'
    enabled: true

  # -- Meta Careers --
  - name: Meta — New Grad SWE
    query: 'site:metacareers.com "Software Engineer" ("New Grad" OR "University Grad" OR "Entry Level" OR "E3" OR "E4") -Senior -Staff'
    enabled: true

  # -- Apple Careers --
  - name: Apple — New Grad SWE
    query: 'site:jobs.apple.com "Software Engineer" ("New Grad" OR "Entry Level" OR "University") -Senior -Principal'
    enabled: true

  # -- Amazon Jobs --
  - name: Amazon — New Grad SDE
    query: 'site:amazon.jobs "Software Development Engineer" ("New Grad" OR "Entry Level" OR "SDE I" OR "SDE1") -Senior -Principal'
    enabled: true

  # -- Microsoft Careers --
  - name: Microsoft — New Grad SWE
    query: 'site:careers.microsoft.com "Software Engineer" ("New Grad" OR "Entry Level" OR "University") -Senior -Principal'
    enabled: true

  # -- Netflix Jobs --
  - name: Netflix — New Grad SWE
    query: 'site:jobs.netflix.com "Software Engineer" ("New Grad" OR "University" OR "Entry Level") -Senior -Staff'
    enabled: true

  # -- Uber Careers --
  - name: Uber — New Grad SWE
    query: 'site:uber.com/us/en/careers "Software Engineer" ("New Grad" OR "Entry Level" OR "University") -Senior'
    enabled: true

  # -- Airbnb Careers --
  - name: Airbnb — New Grad SWE
    query: 'site:careers.airbnb.com "Software Engineer" ("New Grad" OR "Entry Level" OR "University") -Senior -Staff'
    enabled: true

  # -- General ATS boards — new grad SWE --
  - name: Greenhouse — New Grad SWE
    query: 'site:job-boards.greenhouse.io "Software Engineer" ("New Grad" OR "Entry Level" OR "Junior" OR "Associate") -Senior -Staff'
    enabled: true

  - name: Ashby — New Grad SWE
    query: 'site:jobs.ashbyhq.com "Software Engineer" ("New Grad" OR "Entry Level" OR "Junior" OR "Associate") -Senior -Staff'
    enabled: true

  - name: Lever — New Grad SWE
    query: 'site:jobs.lever.co "Software Engineer" ("New Grad" OR "Entry Level" OR "Junior" OR "Associate") -Senior -Staff'
    enabled: true

  # -- YC / startup new grad --
  - name: YC Jobs — New Grad SWE
    query: 'site:workatastartup.com "Software Engineer" ("New Grad" OR "Entry Level" OR "Junior") Python OR Java OR TypeScript'
    enabled: true

  # -- Remote aggregators --
  - name: Himalayas — New Grad SWE Remote
    query: 'site:himalayas.app "Software Engineer" ("New Grad" OR "Entry Level" OR "Junior") remote'
    enabled: true

  - name: RemoteOK — Junior SWE
    query: 'site:remoteok.com "Software Engineer" OR "Backend Engineer" ("Junior" OR "Entry Level" OR "New Grad") Python OR Java'
    enabled: true

  - name: HN Who's Hiring — New Grad SWE
    query: 'site:news.ycombinator.com "Software Engineer" ("new grad" OR "entry level" OR "junior") Python OR Java OR TypeScript remote'
    enabled: true

